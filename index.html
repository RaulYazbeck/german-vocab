<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>German Vocabulary</title>
<!-- ─────────────────────────────────────────────
  TO ADD A NEW LEVEL (e.g. A3):
  1. Create german_decks_a3.js following the same format as the existing files
  2. Add a <script> tag below pointing to it
  3. Add DECKS_A3 to the ALL_GROUPS array in the script at the bottom
───────────────────────────────────────────── -->
<script src="german_decks_a1.js"></script>
<script src="german_decks_a2.js"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.app { max-width: 720px; margin: 0 auto; padding: 2rem 1rem; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
h1 { font-size: 20px; font-weight: 600; }
.view-btn { font-size: 13px; padding: 6px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; color: #555; }
.view-btn:hover { background: #f0f0f0; }
.group { margin-bottom: 1.25rem; }
.group-header { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: white; border: 1px solid #e0e0e0; border-radius: 10px; cursor: pointer; user-select: none; margin-bottom: 6px; }
.group-header:hover { background: #f9f9f9; }
.group-icon { font-size: 18px; }
.group-name { font-size: 14px; font-weight: 600; flex: 1; }
.group-meta { font-size: 12px; color: #aaa; }
.group-chevron { font-size: 11px; color: #aaa; transition: transform 0.2s; display: inline-block; }
.group-chevron.open { transform: rotate(90deg); }
.group-decks { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; padding-left: 8px; }
.group-decks.collapsed { display: none; }
.folder-card { background: white; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 1rem; cursor: pointer; position: relative; user-select: none; transition: border-color 0.15s; }
.folder-card:hover { border-color: #aaa; }
.folder-card.selected { border: 2px solid #1D9E75; background: #f0faf6; }
.folder-check { position: absolute; top: 10px; right: 10px; width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #ccc; background: white; display: flex; align-items: center; justify-content: center; font-size: 10px; color: transparent; }
.folder-card.selected .folder-check { background: #1D9E75; border-color: #1D9E75; color: white; }
.folder-icon { font-size: 20px; margin-bottom: 8px; }
.folder-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; padding-right: 22px; }
.folder-meta { font-size: 11px; color: #888; }
.progress-bar { height: 3px; background: #eee; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-fill { height: 100%; background: #1D9E75; border-radius: 2px; }
.start-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; margin-bottom: 1.5rem; padding: 12px 16px; background: white; border-radius: 10px; border: 1px solid #e0e0e0; }
.start-bar-left { font-size: 13px; color: #555; }
.start-bar-left strong { color: #1a1a1a; }
.start-bar-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.mode-toggle { display: flex; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
.mode-btn { font-size: 12px; padding: 6px 12px; background: transparent; border: none; cursor: pointer; color: #888; }
.mode-btn.active { background: #f5f5f3; color: #1a1a1a; font-weight: 600; }
.start-btn { font-size: 13px; font-weight: 600; padding: 7px 20px; background: #1D9E75; color: white; border: none; border-radius: 8px; cursor: pointer; }
.start-btn:hover { background: #0F6E56; }
.drill-area { background: white; border: 1px solid #e0e0e0; border-radius: 14px; padding: 2rem 1.5rem; }
.drill-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
.deck-label { font-size: 12px; color: #888; max-width: 60%; }
.drill-counters { display: flex; gap: 14px; font-size: 13px; color: #888; }
.drill-counters span { font-weight: 600; color: #1a1a1a; }
.word-display { text-align: center; margin-bottom: 2rem; }
.english-word { font-size: 30px; font-weight: 600; margin-bottom: 6px; }
.word-hint { font-size: 13px; color: #888; }
.streak-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e6f7f2; color: #0F6E56; font-weight: 600; }
.mastered-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #eeecfd; color: #3C3489; font-weight: 600; }
.german-input { width: 100%; height: 44px; padding: 0 14px; font-size: 16px; border: 1.5px solid #ddd; border-radius: 10px; background: white; color: #1a1a1a; outline: none; margin-bottom: 10px; }
.german-input:focus { border-color: #1D9E75; box-shadow: 0 0 0 3px rgba(29,158,117,0.12); }
.german-input.correct { border-color: #1D9E75; background: #f0faf6; }
.german-input.wrong { border-color: #E24B4A; background: #fff5f5; }
.action-row { display: flex; gap: 8px; margin-bottom: 1rem; }
.check-btn { flex: 1; height: 40px; font-size: 14px; border: 1.5px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: 500; }
.check-btn:hover { background: #f5f5f3; }
.dontknow-btn { height: 40px; padding: 0 16px; font-size: 13px; border: 1.5px solid #ddd; border-radius: 10px; background: transparent; color: #888; cursor: pointer; white-space: nowrap; }
.dontknow-btn:hover { background: #f5f5f3; color: #1a1a1a; }
.feedback { min-height: 52px; display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 1rem; }
.feedback-left { display: flex; flex-direction: column; gap: 4px; }
.feedback-text { font-size: 14px; }
.feedback-text.correct { color: #0F6E56; }
.feedback-text.wrong { color: #993C1D; }
.plural-text { font-size: 12px; color: #888; }
.feedback-right { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.next-btn { font-size: 13px; padding: 7px 16px; border: 1.5px solid #ddd; border-radius: 8px; background: white; cursor: pointer; }
.next-btn:hover { background: #f5f5f3; }
.audio-btn { font-size: 18px; padding: 6px 10px; border: 1.5px solid #ddd; border-radius: 8px; background: white; cursor: pointer; color: #555; }
.audio-btn:hover { background: #f5f5f3; }
.stats-row { display: flex; gap: 8px; padding-top: 1rem; border-top: 1px solid #eee; }
.mini-stat { flex: 1; background: #f5f5f3; border-radius: 8px; padding: 8px 10px; }
.mini-label { font-size: 11px; color: #888; margin-bottom: 2px; }
.mini-val { font-size: 17px; font-weight: 600; }
.stats-view { background: white; border: 1px solid #e0e0e0; border-radius: 14px; padding: 1.5rem; }
.stats-title { font-size: 15px; font-weight: 600; margin-bottom: 1rem; }
.stats-section { margin-bottom: 1.5rem; }
.stats-section-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #555; }
table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { text-align: left; font-weight: 600; color: #888; padding: 6px 8px; border-bottom: 1px solid #eee; }
td { padding: 6px 8px; border-bottom: 1px solid #f0f0f0; }
tr:last-child td { border-bottom: none; }
@media (max-width: 480px) {
  .app { padding: 1rem 0.75rem; }
  .english-word { font-size: 24px; }
  .start-bar { flex-direction: column; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>🇩🇪 German Vocabulary</h1>
    <button class="view-btn" id="stats-btn" onclick="toggleStats()">Stats</button>
  </div>
  <div id="groups-container"></div>
  <div id="start-bar" style="display:none"></div>
  <div id="drill-area" style="display:none"></div>
  <div id="stats-view" style="display:none"></div>
</div>

<script>
// ─────────────────────────────────────────────
// REGISTER ALL GROUPS HERE
// To add A3: create german_decks_a3.js, add its <script> tag in <head>, then add DECKS_A3 here
// ─────────────────────────────────────────────
const ALL_GROUPS = [DECKS_A1, DECKS_A2];

const STORAGE_KEY = "german_vocab_v4";
let state = loadState();
let selectedIds = new Set();
let openGroups = new Set();
let activeWords = [];
let currentWord = null;
let answered = false;
let showStats = false;
let hardestFirst = false;
let deVoice = null;

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return { words: {} };
}
function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}
function getWS(deckId, idx) {
  const key = deckId + "_" + idx;
  if (!state.words[key]) state.words[key] = { correct:0, wrong:0, streak:0 };
  return state.words[key];
}

function initVoice() {
  if (!window.speechSynthesis) return;
  const load = () => {
    const v = speechSynthesis.getVoices();
    deVoice = v.find(x => x.lang === "de-DE") || v.find(x => x.lang.startsWith("de")) || null;
  };
  load();
  speechSynthesis.onvoiceschanged = load;
}
function speak(text) {
  if (!window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE"; u.rate = 0.85;
  if (deVoice) u.voice = deVoice;
  speechSynthesis.speak(u);
}

function stripAccents(s) { return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function normalize(s) { return stripAccents(s.trim().toLowerCase()).replace(/\s+/g," "); }
function isCorrect(input, answer) {
  if (!input.trim()) return false;
  const ni = normalize(input);
  if (ni === normalize(answer)) return true;
  return answer.split("/").map(p => normalize(p.trim())).some(p => ni === p);
}

function getWeight(w) {
  const ws = getWS(w.deckId, w.idx);
  if (hardestFirst) return ws.wrong - ws.correct;
  if (ws.streak >= 5) return Math.max(1, 8 - ws.streak);
  if (ws.wrong > ws.correct && ws.wrong > 0) return 10 + ws.wrong * 2;
  return 5;
}
function pickNext() {
  if (!activeWords.length) return null;
  if (hardestFirst) {
    const sorted = [...activeWords].sort((a,b) => getWeight(b) - getWeight(a));
    const top = getWeight(sorted[0]);
    const tied = sorted.filter(w => getWeight(w) === top);
    return tied[Math.floor(Math.random() * tied.length)];
  }
  const weights = activeWords.map(w => Math.max(1, getWeight(w)));
  const total = weights.reduce((a,b)=>a+b,0);
  let r = Math.random() * total;
  for (let i = 0; i < weights.length; i++) { r -= weights[i]; if (r <= 0) return activeWords[i]; }
  return activeWords[activeWords.length-1];
}

function getDeck(deckId) {
  for (const g of ALL_GROUPS)
    for (const d of g.decks)
      if (d.id === deckId) return d;
  return null;
}
function deckProgress(deck) {
  const mastered = deck.words.filter((_,i) => getWS(deck.id,i).streak >= 5).length;
  return { mastered, total: deck.words.length };
}

function toggleGroup(groupId) {
  if (openGroups.has(groupId)) openGroups.delete(groupId);
  else openGroups.add(groupId);
  renderGroups();
}
function toggleDeck(deckId) {
  if (selectedIds.has(deckId)) selectedIds.delete(deckId);
  else selectedIds.add(deckId);
  renderGroups();
  renderStartBar();
}
function renderGroups() {
  document.getElementById("groups-container").innerHTML = ALL_GROUPS.map(group => {
    const isOpen = openGroups.has(group.id);
    const totalWords = group.decks.reduce((s,d) => s + d.words.length, 0);
    const totalMastered = group.decks.reduce((s,d) => s + deckProgress(d).mastered, 0);
    const decksHtml = group.decks.map(deck => {
      const {mastered,total} = deckProgress(deck);
      const pct = Math.round((mastered/total)*100);
      const sel = selectedIds.has(deck.id);
      return `<div class="folder-card ${sel?"selected":""}" onclick="toggleDeck('${deck.id}')">
        <div class="folder-check">✓</div>
        <div class="folder-icon">${deck.icon}</div>
        <div class="folder-name">${deck.name}</div>
        <div class="folder-meta">${total} words · ${mastered} mastered</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>`;
    }).join("");
    return `<div class="group">
      <div class="group-header" onclick="toggleGroup('${group.id}')">
        <span class="group-icon">${group.icon}</span>
        <span class="group-name">${group.name}</span>
        <span class="group-meta">${group.decks.length} deck${group.decks.length!==1?"s":""} · ${totalWords} words · ${totalMastered} mastered</span>
        <span class="group-chevron ${isOpen?"open":""}">▶</span>
      </div>
      <div class="group-decks ${isOpen?"":"collapsed"}">${decksHtml}</div>
    </div>`;
  }).join("");
}

function renderStartBar() {
  const bar = document.getElementById("start-bar");
  if (selectedIds.size === 0) { bar.style.display = "none"; return; }
  const totalWords = [...selectedIds].reduce((s,id) => { const d=getDeck(id); return s+(d?d.words.length:0); }, 0);
  const names = [...selectedIds].map(id => getDeck(id)?.name).filter(Boolean).join(", ");
  bar.style.display = "flex";
  bar.innerHTML = `
    <div class="start-bar-left">
      <strong>${selectedIds.size}</strong> deck${selectedIds.size!==1?"s":""} · <strong>${totalWords}</strong> words<br>
      <span style="font-size:11px;color:#aaa">${names}</span>
    </div>
    <div class="start-bar-right">
      <div class="mode-toggle">
        <button class="mode-btn ${!hardestFirst?"active":""}" onclick="setMode(false)">Random</button>
        <button class="mode-btn ${hardestFirst?"active":""}" onclick="setMode(true)">Hardest first</button>
      </div>
      <button class="start-btn" onclick="startDrill()">Start ▶</button>
    </div>`;
}
function setMode(val) { hardestFirst = val; renderStartBar(); }

function startDrill() {
  activeWords = [];
  selectedIds.forEach(id => {
    const deck = getDeck(id);
    if (!deck) return;
    deck.words.forEach((w,i) => activeWords.push({...w, deckId:id, deckName:deck.name, idx:i}));
  });
  showStats = false;
  document.getElementById("stats-view").style.display = "none";
  document.getElementById("stats-btn").textContent = "Stats";
  nextWord();
}
function nextWord() {
  answered = false;
  currentWord = pickNext();
  renderDrill();
}
function miniStats(ws) {
  return `
    <div class="mini-stat"><div class="mini-label">correct</div><div class="mini-val">${ws.correct}</div></div>
    <div class="mini-stat"><div class="mini-label">wrong</div><div class="mini-val">${ws.wrong}</div></div>
    <div class="mini-stat"><div class="mini-label">streak</div><div class="mini-val">${ws.streak}</div></div>
    <div class="mini-stat"><div class="mini-label">mastered</div><div class="mini-val">${ws.streak>=5?"✓":"—"}</div></div>`;
}
function renderDrill() {
  const el = document.getElementById("drill-area");
  el.style.display = "block";
  if (!currentWord) return;
  const ws = getWS(currentWord.deckId, currentWord.idx);
  const badges = [
    ws.streak>=5 ? `<span class="mastered-badge">✓ mastered</span>` : "",
    ws.streak>0&&ws.streak<5 ? `<span class="streak-badge">🔥 ${ws.streak} streak</span>` : ""
  ].join(" ");
  const deckNames = [...selectedIds].map(id=>getDeck(id)?.name).filter(Boolean).join(" + ");
  el.innerHTML = `
    <div class="drill-top">
      <div class="deck-label">${deckNames}</div>
      <div class="drill-counters">correct <span>${ws.correct}</span> &nbsp; wrong <span>${ws.wrong}</span></div>
    </div>
    <div class="word-display">
      <div class="english-word">${currentWord.en}</div>
      <div class="word-hint">${currentWord.hint} ${badges}</div>
    </div>
    <input type="text" class="german-input" id="german-input" placeholder="type in German…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="handleKey(event)" />
    <div class="action-row">
      <button class="check-btn" onclick="checkAnswer()">Check</button>
      <button class="dontknow-btn" onclick="dontKnow()">? Don't know</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="stats-row" id="stats-row">${miniStats(ws)}</div>`;
  setTimeout(() => { const i = document.getElementById("german-input"); if(i) i.focus(); }, 50);
}
function showFeedback(correct, ws) {
  const pluralHtml = currentWord.pl ? `<div class="plural-text">plural: ${currentWord.pl}</div>` : "";
  const cls = correct ? "correct" : "wrong";
  const icon = correct ? "✓" : "✗";
  document.getElementById("feedback").innerHTML = `
    <div class="feedback-left">
      <div class="feedback-text ${cls}">${icon} ${correct?"Correct!":"Answer:"} <strong>${currentWord.de}</strong></div>
      ${pluralHtml}
    </div>
    <div class="feedback-right">
      <button class="audio-btn" onclick="speak('${currentWord.de.replace(/'/g,"\\'")}')">🔊</button>
      <button class="next-btn" onclick="nextWord()">Next →</button>
    </div>`;
  speak(currentWord.de);
  document.getElementById("stats-row").innerHTML = miniStats(ws);
}
function handleKey(e) {
  if (e.key==="Enter") { if (answered) nextWord(); else checkAnswer(); }
}
function checkAnswer() {
  if (answered) return;
  const input = document.getElementById("german-input");
  if (!input||!currentWord) return;
  if (!input.value.trim()) { dontKnow(); return; }
  answered = true;
  const correct = isCorrect(input.value, currentWord.de);
  const ws = getWS(currentWord.deckId, currentWord.idx);
  if (correct) { ws.correct++; ws.streak++; input.classList.add("correct"); }
  else { ws.wrong++; ws.streak=0; input.classList.add("wrong"); }
  saveState();
  showFeedback(correct, ws);
}
function dontKnow() {
  if (answered) return;
  answered = true;
  const ws = getWS(currentWord.deckId, currentWord.idx);
  ws.wrong++; ws.streak=0;
  const input = document.getElementById("german-input");
  if (input) { input.value=currentWord.de; input.classList.add("wrong"); }
  saveState();
  showFeedback(false, ws);
}

function toggleStats() {
  showStats = !showStats;
  const sv = document.getElementById("stats-view");
  const da = document.getElementById("drill-area");
  const btn = document.getElementById("stats-btn");
  if (showStats) {
    sv.style.display="block"; da.style.display="none";
    btn.textContent="← Back";
    renderStatsView();
  } else {
    sv.style.display="none";
    if (activeWords.length) da.style.display="block";
    btn.textContent="Stats";
  }
}
function renderStatsView() {
  let html = `<div class="stats-title">Progress across all decks</div>`;
  ALL_GROUPS.forEach(group => {
    html += `<div class="stats-section"><div class="stats-section-title">${group.icon} ${group.name}</div>`;
    group.decks.forEach(deck => {
      const {mastered,total} = deckProgress(deck);
      html += `<div style="margin-bottom:1rem">
        <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:6px">${deck.icon} ${deck.name} — ${mastered}/${total} mastered</div>
        <table><thead><tr><th>English</th><th>German</th><th>Plural</th><th>✓</th><th>✗</th><th>Streak</th></tr></thead><tbody>`;
      deck.words.forEach((w,i) => {
        const ws = getWS(deck.id,i);
        const st = ws.streak>=5 ? `<span class="mastered-badge">mastered</span>`
          : ws.streak>0 ? `<span class="streak-badge">${ws.streak}</span>`
          : `<span style="color:#bbb">new</span>`;
        html += `<tr><td>${w.en}</td><td style="color:#555">${w.de}</td><td style="color:#aaa">${w.pl||"—"}</td><td>${ws.correct}</td><td>${ws.wrong}</td><td>${st}</td></tr>`;
      });
      html += `</tbody></table></div>`;
    });
    html += `</div>`;
  });
  document.getElementById("stats-view").innerHTML = html;
}

initVoice();
renderGroups();
</script>
</body>
</html>

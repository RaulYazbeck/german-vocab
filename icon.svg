<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded background -->
  <rect width="512" height="512" rx="100" ry="100" fill="#1a1a1a"/>
  <!-- German flag stripes -->
  <rect x="56" y="180" width="400" height="58" rx="8" fill="#1a1a1a"/>
  <rect x="56" y="238" width="400" height="58" rx="0" fill="#DD0000"/>
  <rect x="56" y="296" width="400" height="58" rx="8" fill="#FFCE00"/>
  <!-- Clip stripes to rounded rect shape -->
  <rect x="56" y="180" width="400" height="176" rx="16" fill="none" stroke="none"/>
  <!-- Graduation cap -->
  <polygon points="256,80 360,130 256,160 152,130" fill="#FFCE00"/>
  <rect x="236" y="155" width="40" height="50" rx="4" fill="#FFCE00"/>
  <ellipse cx="256" cy="205" rx="30" ry="12" fill="#FFCE00"/>
  <!-- Tassel -->
  <line x1="360" y1="130" x2="360" y2="175" stroke="#FFCE00" stroke-width="6"/>
  <circle cx="360" cy="182" r="8" fill="#FFCE00"/>
</svg>
